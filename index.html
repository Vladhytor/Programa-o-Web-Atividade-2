<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ficha de Inscrição</title>
</head>

<body>

<form>

<table border="1" cellpadding="8" align="center">

<tr>
<th colspan="4">Ficha de Inscrição</th>
</tr>

<tr>
<td>Nome do candidato:</td>
<td colspan="3">
<input type="text" name="nome" size="60">
</td>
</tr>

<tr>
<td>Endereço:</td>
<td colspan="3">
<input type="text" name="endereco" size="60">
</td>
</tr>

<tr>
<td>CEP:</td>
<td>
<input type="text" name="cep">
</td>

<td>Cidade:</td>
<td>
<select name="cidade">
<option>-- Cidade --</option>
<option>São Paulo</option>
<option>Rio de Janeiro</option>
<option>Belo Horizonte</option>
</select>
</td>
</tr>

<tr>
<td>UF:</td>
<td>
<select name="uf">
<option>-- UF --</option>
<option>SP</option>
<option>RJ</option>
<option>MG</option>
<option>ES</option>
</select>
</td>

<td>Telefone:</td>
<td>
<input type="text" name="telefone">
</td>
</tr>

<tr>
<td>RG:</td>
<td>
<input type="text" name="rg">
</td>

<td>CPF:</td>
<td>
<input type="text" name="cpf">
</td>
</tr>

<tr>
<td>Sexo:</td>
<td colspan="3">
<input type="radio" name="sexo"> Mas.
<input type="radio" name="sexo"> Fem.
</td>
</tr>

<tr>
<td>Escolaridade:</td>
<td>
<select name="escolaridade">
<option>-- Selecione --</option>
<option>Ensino Fundamental</option>
<option>Ensino Médio</option>
<option>Ensino Superior</option>
</select>
</td>

<td>Email:</td>
<td>
<input type="email" name="email">
</td>
</tr>

<tr>
<td>Curso:</td>
<td>
<select name="curso">
<option>-- Selecione --</option>
<option>Informática</option>
<option>Administração</option>
<option>Enfermagem</option>
</select>
</td>

<td>Senha de acompanhamento:</td>
<td>
<input type="password" name="senha">
</td>
</tr>

<tr>
<td colspan="4" align="center">
<input type="submit" value="CADASTRAR">
</td>
</tr>

</table>

</form>

</body>
</html>
